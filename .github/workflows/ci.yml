name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-spfx:
    name: Build SPFx
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spfx
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: spfx/package-lock.json
      - run: npm ci
      - name: Generate CI env stub
        run: |
          cat > src/config/env.generated.ts << 'ENVEOF'
          // Generated by CI pipeline -- placeholder values for compilation only
          export const ENV = {
            AZURE_CLIENT_ID: 'CI_PLACEHOLDER',
            AZURE_TENANT_ID: '',
            APP_BASE_URL: '',
            DEV_USER_NAME: '',
            DEV_USER_EMAIL: '',
          } as const;
          ENVEOF
      - run: npx heft test --clean --production
      - run: npx heft package-solution --production
      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: spfx-package
          path: spfx/sharepoint/solution/renta-vehicle.sppkg

  build-api:
    name: Build API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/
